  <rect width="176" height="176" fill="#f0faf6"/>

  <!-- Ear tufts -->
  <path d="M70 68 Q64 50 72 44 Q76 58 78 66Z" fill="#f0faf6" stroke="#3d8c7a" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M106 68 Q112 50 104 44 Q100 58 98 66Z" fill="#f0faf6" stroke="#3d8c7a" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Body -->
  <circle cx="88" cy="100" r="62" fill="#f0faf6" stroke="#3d8c7a" stroke-width="3"/>

  <!-- Chest feathers -->
  <ellipse cx="88" cy="103" rx="44" ry="40" fill="none" stroke="#3d8c7a" stroke-width="1.8" opacity="0.35"/>

  <!-- Normal eyebrows -->
  <path d="M 60 79 Q 70 74 80 77" stroke="#3d8c7a" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M 96 77 Q 106 74 116 79" stroke="#3d8c7a" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Left eye -->
  <ellipse cx="70" cy="97" rx="16" ry="16" fill="white" stroke="#3d8c7a" stroke-width="2.6"/>
  <circle cx="70" cy="97" r="9" fill="#3d8c7a"/>
  <circle cx="73" cy="93" r="3" fill="white"/>

  <!-- Right eye -->
  <ellipse cx="106" cy="97" rx="16" ry="16" fill="white" stroke="#3d8c7a" stroke-width="2.6"/>
  <circle cx="106" cy="97" r="9" fill="#3d8c7a"/>
  <circle cx="109" cy="93" r="3" fill="white"/>

  <!-- Beak -->
  <path d="M82 113 Q88 124 94 113 Q88 109 82 113Z" fill="#f9c74f" stroke="#3d8c7a" stroke-width="2.2" stroke-linejoin="round"/>
</svg>
